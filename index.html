<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FattahMusic AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter;
background:radial-gradient(circle at top,#1d1c40,#050510);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* glowing background */

body:before{
content:"";
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,#6c5cff66,transparent);
top:-200px;
left:50%;
transform:translateX(-50%);
filter:blur(120px);
z-index:-1;
pointer-events:none;
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
}

.logo{
font-size:26px;
font-weight:700;
background:linear-gradient(90deg,#6cffd2,#6ca8ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* container */

.container{
max-width:600px;
margin:auto;
padding:30px;
}

/* glass card */

.card{

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

border-radius:22px;

padding:25px;

backdrop-filter:blur(20px);

box-shadow:0 0 30px rgba(90,70,255,.3);

}

/* prompt */

textarea{

width:100%;

background:#0f0f1d;

border:none;

border-radius:12px;

padding:15px;

color:white;

font-size:15px;

}

/* selector */

.section{
margin-top:20px;
}

.section h4{
color:#aaa;
margin-bottom:10px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{

padding:10px 15px;

border-radius:12px;

background:#121225;

border:1px solid rgba(255,255,255,0.1);

cursor:pointer;

transition:.2s;

}

.btn:hover{
transform:scale(1.05);
}

.btn.active{
background:linear-gradient(90deg,#4fa3ff,#7c5cff);
}

/* generate */

.generate{

margin-top:25px;

width:100%;

padding:16px;

border:none;

border-radius:30px;

font-size:18px;

cursor:pointer;

background:linear-gradient(90deg,#67ffd8,#ff6bff);

font-weight:600;

}

/* loading */

.loading{
display:none;
text-align:center;
margin-top:40px;
}

.loading img{
width:240px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.7);
}

/* player */

.player{
display:none;
margin-top:40px;
text-align:center;
}

.player img{
width:240px;
border-radius:16px;
margin-bottom:20px;
}

audio{
width:100%;
margin-bottom:20px;
}

/* buttons */

.actions button{

padding:12px 18px;

border:none;

border-radius:12px;

cursor:pointer;

margin:5px;

}

.download{
background:#28c76f;
color:white;
}

.share{
background:#3b82f6;
color:white;
}

/* lyrics */

.lyrics{
margin-top:20px;
color:#bbb;
white-space:pre-line;
font-size:14px;
}

</style>
</head>

<body>

<header>

<div class="logo">FattahMusic AI</div>

</header>

<div class="container">

<div class="card">

<textarea id="prompt" rows="3">
Create an energetic pop song about summer vacation
</textarea>

<div class="section">

<h4>Genre</h4>

<div class="row">

<div class="btn active">Pop</div>
<div class="btn">EDM</div>
<div class="btn">LoFi</div>
<div class="btn">Trap</div>

</div>

</div>

<div class="section">

<h4>Mood</h4>

<div class="row">

<div class="btn active">Energetic</div>
<div class="btn">Happy</div>
<div class="btn">Chill</div>

</div>

</div>

<div class="section">

<h4>Vocal</h4>

<div class="row">

<div class="btn">Male</div>
<div class="btn active">Female</div>
<div class="btn">Instrumental</div>

</div>

</div>

<button class="generate" onclick="generateMusic()">
▶ Generate Music
</button>

</div>


<div class="loading" id="loading">

<img id="loadingImg" src="https://picsum.photos/400?1">

<p>AI is composing your song...</p>

</div>


<div class="player" id="player">

<img id="cover">

<audio controls id="audio"></audio>

<div class="actions">

<button class="download" onclick="downloadSong()">Download</button>

<button class="share" onclick="shareSong()">Share</button>

</div>

<div class="lyrics" id="lyrics"></div>

</div>

</div>


<script>

/* selector active */

document.querySelectorAll(".row").forEach(row=>{

row.querySelectorAll(".btn").forEach(btn=>{

btn.onclick=()=>{

row.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

}

})

})

/* loading slideshow */

const images=[
"https://picsum.photos/400?1",
"https://picsum.photos/400?2",
"https://picsum.photos/400?3",
"https://picsum.photos/400?4"
]

let index=0

setInterval(()=>{

document.getElementById("loadingImg").src=images[index]

index++

if(index>=images.length) index=0

},2000)


let taskId=""
let audioURL=""

/* generate */

async function generateMusic(){

document.querySelector(".card").style.display="none"

document.getElementById("loading").style.display="block"

const prompt=document.getElementById("prompt").value

const res=await fetch(
"https://musik-android.onrender.com/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt,
callback:"https://musik-android.onrender.com/callback"
})
})

const data=await res.json()

taskId=data.id

checkStatus()

}

/* polling result */

async function checkStatus(){

const res=await fetch(
"https://musik-android.onrender.com/music/"+taskId
)

const data=await res.json()

if(data.status==="completed"){

audioURL=data.audio_url

document.getElementById("cover").src=data.image

document.getElementById("audio").src=data.audio_url

document.getElementById("lyrics").innerText=data.lyrics || ""

document.getElementById("loading").style.display="none"

document.getElementById("player").style.display="block"

}else{

setTimeout(checkStatus,3000)

}

}

/* download */

function downloadSong(){

const a=document.createElement("a")

a.href=audioURL

a.download="ai-song.mp3"

a.click()

}

/* share */

function shareSong(){

if(navigator.share){

navigator.share({
title:"AI Music",
url:audioURL
})

}else{

alert("Share tidak support di browser")

}

}

</script>

</body>
</html>
